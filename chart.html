<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akara Resources — Organization Chart</title>
<style>
  :root{ --blue:#1B4BA8; --blue-dk:#123372; --blue-lt:#e8eef8; --gold:#F5B731;
    --border:#dce3f0; --text:#1a1e2e; --muted:#6b7899; --gray:#f2f4f8;
    --green:#1e9e6b; --green-lt:#e4f7ef; --red:#d44; --red-lt:#ffeaea;
    --orange:#e07b10; --orange-lt:#fff3e0; }
  *{box-sizing:border-box;}
  html,body{margin:0;font-family:'IBM Plex Sans Thai','IBM Plex Sans','Segoe UI',sans-serif;background:#f5f6f8;color:var(--text);-webkit-font-smoothing:antialiased;}
  .topbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
  .topbar img{width:34px;height:34px;border-radius:7px;object-fit:contain;}
  .topbar .t{font-size:15px;font-weight:700;color:var(--blue);}
  .topbar .s{font-size:11px;color:var(--muted);}
  .lang{margin-left:auto;display:inline-flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;}
  .lang button{background:#fff;border:none;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);}
  .lang button.active{background:var(--blue);color:#fff;}
  .wrap{padding:16px;}

  #page-orgchart .oc-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  #page-orgchart .oc-controls input{padding:9px 11px;font-size:14px;border:1px solid var(--border);border-radius:8px;min-width:220px;font-family:inherit;}
  #page-orgchart .oc-seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  #page-orgchart .oc-seg button{background:#fff;border:none;padding:9px 14px;font-size:13px;cursor:pointer;color:var(--muted);border-left:1px solid var(--border);font-family:inherit;}
  #page-orgchart .oc-seg button:first-child{border-left:none;}
  #page-orgchart .oc-seg button.active{background:var(--blue);color:#fff;}
  #page-orgchart .oc-btn{background:#fff;border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;}
  #page-orgchart .oc-btn:hover{background:var(--blue-lt);}
  #page-orgchart .oc-badge{display:inline-block;padding:1px 8px;border-radius:999px;font-size:11.5px;font-weight:500;}
  #page-orgchart .oc-badge.filled{background:var(--green-lt);color:var(--green);}
  #page-orgchart .oc-badge.vacant{background:var(--red-lt);color:var(--red);}
  #page-orgchart .oc-badge.pending,#page-orgchart .oc-badge.filled_pending_name{background:var(--orange-lt);color:var(--orange);}
  #page-orgchart .oc-badge.unknown{background:var(--gray);color:var(--muted);}
  #page-orgchart .oc-breadcrumb{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-bottom:16px;font-size:13px;}
  #page-orgchart .oc-crumb{background:var(--blue-lt);border:1px solid var(--border);color:var(--blue);padding:4px 10px;border-radius:999px;cursor:pointer;white-space:nowrap;}
  #page-orgchart .oc-crumb.current{background:var(--blue);color:#fff;cursor:default;}
  #page-orgchart .oc-sep{color:var(--muted);}
  #page-orgchart .oc-vac-person{color:var(--red);font-style:italic;}
  #page-orgchart .oc-rhead{font-size:13px;color:var(--muted);margin:20px 0 12px;font-weight:600;text-align:center;}
  #page-orgchart .oc-focuscard{display:flex;align-items:center;gap:14px;max-width:460px;margin:0 auto 4px;border:2px solid var(--blue);border-radius:14px;padding:14px 18px;background:linear-gradient(180deg,#f4f8ff,#fff);box-shadow:0 4px 16px rgba(43,91,174,.12);position:relative;}
  #page-orgchart .oc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;align-items:stretch;}
  #page-orgchart .oc-card{display:flex;align-items:center;gap:12px;min-height:86px;border:1px solid var(--border);border-radius:14px;padding:12px 16px;background:#fff;position:relative;box-shadow:0 1px 3px rgba(20,30,60,.05);}
  #page-orgchart .oc-card.kids{cursor:pointer;transition:border-color .12s,box-shadow .12s,transform .05s;}
  #page-orgchart .oc-card.kids:hover{border-color:var(--blue);box-shadow:0 8px 22px rgba(43,91,174,.15);transform:translateY(-1px);}
  #page-orgchart .oc-av{width:48px;height:48px;flex:0 0 48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;text-transform:uppercase;}
  #page-orgchart .oc-focuscard .oc-av{width:54px;height:54px;flex-basis:54px;font-size:17px;}
  #page-orgchart .oc-av-vac{background:#eef0f3;color:var(--muted);border:1.5px dashed var(--border);font-weight:400;}
  #page-orgchart .oc-cinfo{flex:1;min-width:0;}
  #page-orgchart .oc-cn{font-weight:700;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #page-orgchart .oc-cn.vac{color:var(--red);font-weight:600;}
  #page-orgchart .oc-ct{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  #page-orgchart .oc-cstatus{font-size:11.5px;color:var(--blue);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  #page-orgchart .oc-cdept{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  #page-orgchart .oc-countbadge{position:absolute;top:10px;right:10px;font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-lt);border-radius:6px;padding:2px 7px;}
  #page-orgchart .oc-sr{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
  #page-orgchart .oc-sr .it{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);}
  #page-orgchart .oc-sr .it:last-child{border-bottom:none;}
  #page-orgchart .oc-sr .it:hover{background:var(--blue-lt);}
  #page-orgchart .oc-sr .t{font-weight:600;font-size:13.5px;}
  #page-orgchart .oc-sr .s{font-size:12px;color:var(--muted);}
  #page-orgchart .oc-zoombar{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  #page-orgchart .oc-scroll{overflow:auto;padding:8px 4px 16px;max-height:calc(100vh - 220px);}
  #page-orgchart .oc-zoom{display:inline-block;}
  #page-orgchart .oc-svg{position:absolute;top:0;left:0;z-index:0;pointer-events:none;overflow:visible;}
  #page-orgchart .oc-tnode{position:absolute;width:200px;z-index:1;}
  #page-orgchart .oc-rowlabel{position:absolute;left:0;width:48px;font-size:12px;font-weight:700;color:#fff;background:var(--blue);border-radius:6px;padding:3px 0;text-align:center;z-index:2;}
  #page-orgchart .oc-box{width:200px;border:1px solid var(--border);border-top:3px solid var(--muted);border-radius:12px;padding:8px 10px;background:#fff;cursor:pointer;text-align:left;box-shadow:0 1px 3px rgba(20,30,60,.05);height:132px;overflow:hidden;box-sizing:border-box;}
  #page-orgchart .oc-box:hover{border-color:var(--blue);box-shadow:0 6px 18px rgba(43,91,174,.14);}
  #page-orgchart .oc-box.filled{border-top-color:var(--green);}
  #page-orgchart .oc-box.vacant{border-top-color:var(--red);}
  #page-orgchart .oc-box.filled_pending_name{border-top-color:var(--orange);}
  #page-orgchart .ocb-head{display:flex;align-items:center;gap:9px;}
  #page-orgchart .oc-box .oc-av{width:30px;height:30px;flex:0 0 30px;font-size:11px;}
  #page-orgchart .ocb-info{min-width:0;flex:1;}
  #page-orgchart .ocb-name{font-weight:700;font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #page-orgchart .ocb-name.vac{color:var(--red);font-weight:600;}
  #page-orgchart .ocb-title2{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  #page-orgchart .ocb-foot{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:9px;}
  #page-orgchart .ocb-level{font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-lt);border:1px solid #cfdcf3;border-radius:6px;padding:1px 8px;white-space:nowrap;}
  #page-orgchart .ocb-cnt{font-size:10.5px;font-weight:600;color:var(--blue);background:var(--blue-lt);border-radius:6px;padding:1px 6px;white-space:nowrap;}
  #page-orgchart .oc-empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}
  #page-orgchart .oc-muted{color:var(--muted);font-size:12.5px;}
  #page-orgchart .oc-gradehdr{font-size:12.5px;font-weight:700;color:var(--blue);margin:4px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
  /* ===== พิมพ์ / บันทึก PDF: ปลดกรอบเลื่อน แสดงผังทั้งหมด ===== */
  @media print{
    @page{ size: landscape; margin: 8mm; }
    body{ background:#fff !important; }
    .topbar, .oc-controls, .oc-sr, .oc-zoombar, .lang, .oc-breadcrumb{ display:none !important; }
    .wrap{ padding:0 !important; margin:0 !important; max-width:none !important; }
    #oc-drillView{ display:block !important; }
    .oc-scroll{ overflow:visible !important; height:auto !important; max-height:none !important; border:none !important; }
    .oc-box{ box-shadow:none !important; }
    .oc-card, .oc-box, .oc-tnode{ break-inside:avoid; }
    .oc-print-title{ display:block !important; }
  }
  .oc-print-title{ display:none; font-size:16px; font-weight:700; color:var(--blue); margin-bottom:10px; }
</style>
</head>
<body>
<div class="topbar">
  <img src="logo.jpg" alt="Akara">
  <div><div class="t">AKARA RESOURCES</div><div class="s" data-en="Organization Chart" data-th="ผังองค์กร">ผังองค์กร</div></div>
  <div class="lang"><button id="lang-en" class="active" onclick="ocSetLang('en')">EN</button><button id="lang-th" onclick="ocSetLang('th')">TH</button></div>
</div>

<div class="wrap">
  <div id="page-orgchart">
    <div class="oc-controls">
      <input type="text" id="oc-search" placeholder="ค้นหาชื่อตำแหน่ง/ชื่อคน...">
      <div class="oc-seg">
        <button class="active" id="oc-modeCards" onclick="ocSetMode('cards')" data-en="Cards" data-th="การ์ด">การ์ด</button>
        <button id="oc-modeChart" onclick="ocSetMode('chart')" data-en="Tree chart" data-th="แผนภูมิเส้น">แผนภูมิเส้น</button>
      </div>
      <button class="oc-btn" onclick="ocSetFocus(null)" data-en="▲ Top" data-th="▲ บนสุด">▲ บนสุด</button>
      <select id="oc-dept" onchange="ocDeptChange()" style="padding:9px 11px;font-size:14px;border:1px solid var(--border);border-radius:8px;font-family:inherit;min-width:200px"><option value="">— ทุกแผนก —</option></select>
      <select id="oc-paper" title="ขนาดกระดาษ" style="padding:9px 11px;font-size:14px;border:1px solid var(--border);border-radius:8px;font-family:inherit">
        <option value="fit" data-en="Fit to chart" data-th="พอดีผัง">พอดีผัง</option>
        <option value="a4">A4</option><option value="a3">A3</option><option value="a2">A2</option><option value="a1">A1</option>
      </select>
      <button class="oc-btn" onclick="ocPrint()" data-en="🖨️ Print / PDF" data-th="🖨️ พิมพ์ / PDF">🖨️ พิมพ์ / PDF</button>
    </div>
    <div class="oc-print-title" id="oc-print-title"></div>
    <div class="oc-sr" id="oc-searchResults" style="display:none"></div>
    <div id="oc-drillView">
      <nav class="oc-breadcrumb" id="oc-breadcrumb"></nav>
      <div id="oc-cardsView">
        <div id="oc-focusBox"></div>
        <div class="oc-rhead" id="oc-rhead"></div>
        <div class="oc-grid" id="oc-grid"></div>
      </div>
      <div id="oc-chartView" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// ====== CONFIG (anon key = public read-only) ======
const URL='https://allwoertbjgyfqnqgetu.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsbHdvZXJ0YmpneWZxbnFnZXR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4OTc4NzgsImV4cCI6MjA5NzQ3Mzg3OH0.kpzH27gZyBeBE7K132wYdlDVjZhCN2uNBTa8XWrUOBc';
async function apiGet(path){ const r=await fetch(URL+'/rest/v1/'+path,{headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Accept-Profile':'orgchart'}}); if(!r.ok) throw new Error(await r.text()); return r.json(); }

let lang=(function(){ try{ return localStorage.getItem('ak_oc_lang')||'en'; }catch(e){ return 'en'; } })();  // จำภาษาล่าสุด (ครั้งแรก = EN)
let allRows=[], byId=new Map(), roots=[], focusId=null, viewMode='cards', chartZoom=1, chartDepth=2, deptFilter='', treeLayout='grade';
function ocToggleLayout(){ treeLayout = treeLayout==='grade' ? 'vertical' : 'grade'; renderDrill(); }
const OC_GRADES=['CEO','M4','M3','M2','M1 Senior','M1','S3','S2','S1','O3','O2','O1'];
const AV=['#2B5BAE','#1a6e5a','#8e3d8e','#c0562a','#1a7a7a','#a04a1a','#2c6b2f','#7a3b6e'];

function ocT(th,en){ return lang==='en'?en:th; }
function esc(s){ if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function statusLabel(s){ return {filled:'Filled',vacant:'Vacant',filled_pending_name:'Pending',unknown:'Unknown'}[s]||s; }
function gRank(g){ const i=OC_GRADES.indexOf(g); return i<0?99:i; }
function avColor(n){ let h=0; for(const c of n) h=(h+c.charCodeAt(0))%AV.length; return AV[h]; }
function ocNm(n){ if(!n) return ''; return lang==='th' ? (n.incumbent_th||n.incumbent||'') : (n.incumbent||n.incumbent_th||''); }
function ocActNm(n){ if(!n) return ''; return lang==='th' ? (n.acting_coverage_th||n.acting_coverage||'') : (n.acting_coverage||n.acting_coverage_th||''); }
function avatar(n){ const nm=ocNm(n); return nm?`<div class="oc-av" style="background:${avColor(n.incumbent||nm)}">${esc(nm.trim().slice(0,2))}</div>`:`<div class="oc-av oc-av-vac">○</div>`; }

async function load(){
  try{
    allRows = await apiGet('v_org_chart_current?select=position_id,division,department,grade,title,incumbent,status,acting_coverage,reports_to_position_id,reports_to_title,is_active,incumbent_th,acting_coverage_th,reports_to_incumbent_th&is_active=eq.true');
  }catch(e){ document.getElementById('oc-drillView').innerHTML=`<div class="oc-empty">${ocT('โหลดข้อมูลไม่สำเร็จ','Failed to load')}: ${esc(e.message)}</div>`; return; }
  buildIndex();
  populateDept();
  focusId = roots.length===1 ? roots[0].position_id : null;
  renderDrill();
}
function populateDept(){
  const sel=document.getElementById('oc-dept'); if(!sel) return;
  const byDiv={};
  allRows.forEach(r=>{ (byDiv[r.division]=byDiv[r.division]||new Set()).add(r.department); });
  let html=`<option value="">${ocT('— ทุกแผนก (ไล่ตามสายงาน) —','— All (by hierarchy) —')}</option>`;
  Object.keys(byDiv).sort().forEach(d=>{ html+=`<optgroup label="${esc(d)}">`+[...byDiv[d]].sort().map(dep=>`<option value="${esc(dep)}">${esc(dep)}</option>`).join('')+`</optgroup>`; });
  sel.innerHTML=html; sel.value=deptFilter;
}
function ocDeptChange(){ deptFilter=document.getElementById('oc-dept').value; if(deptFilter){ ocSetMode('cards'); } else { renderDrill(); } }
function buildIndex(){
  byId=new Map(allRows.map(r=>[r.position_id,{...r,children:[]}]));
  roots=[];
  for(const n of byId.values()){ const p=n.reports_to_position_id?byId.get(n.reports_to_position_id):null; if(p)p.children.push(n); else roots.push(n); }
  const sf=(a,b)=>(a.department||'').localeCompare(b.department||'')||(a.title||'').localeCompare(b.title||'');
  byId.forEach(n=>n.children.sort(sf)); roots.sort(sf);
}
function descCount(n){ let c=0; for(const ch of n.children) c+=1+descCount(ch); return c; }
function ancestors(n){ const ch=[]; let cur=n.reports_to_position_id?byId.get(n.reports_to_position_id):null; while(cur){ch.unshift(cur);cur=cur.reports_to_position_id?byId.get(cur.reports_to_position_id):null;} return ch; }

function ocSetFocus(id){ focusId=id; deptFilter=''; const ds=document.getElementById('oc-dept'); if(ds) ds.value=''; document.getElementById('oc-search').value=''; document.getElementById('oc-searchResults').style.display='none'; document.getElementById('oc-drillView').style.display='block'; renderDrill(); window.scrollTo({top:0,behavior:'smooth'}); }
function ocSetMode(m){ viewMode=m; document.getElementById('oc-modeCards').classList.toggle('active',m==='cards'); document.getElementById('oc-modeChart').classList.toggle('active',m==='chart'); document.getElementById('oc-cardsView').style.display=m==='cards'?'block':'none'; document.getElementById('oc-chartView').style.display=m==='chart'?'block':'none'; renderDrill(); }

function renderDrill(){
  if(deptFilter){
    document.getElementById('oc-breadcrumb').innerHTML=`<span class="oc-crumb" onclick="ocSetFocus(null)">${ocT('องค์กร','Organization')}</span><span class="oc-sep">›</span><span class="oc-crumb current">${esc(deptFilter)}</span>`;
    renderCards(null); return;
  }
  const focus=focusId?byId.get(focusId):null;
  const cr=[`<span class="oc-crumb ${focus?'':'current'}" onclick="ocSetFocus(null)">${ocT('องค์กร','Organization')}</span>`];
  if(focus){ ancestors(focus).forEach(a=>{cr.push('<span class="oc-sep">›</span>');cr.push(`<span class="oc-crumb" onclick="ocSetFocus('${a.position_id}')">${esc(a.title)}</span>`);}); cr.push('<span class="oc-sep">›</span>'); cr.push(`<span class="oc-crumb current">${esc(focus.title)}</span>`); }
  document.getElementById('oc-breadcrumb').innerHTML=cr.join(' ');
  if(viewMode==='chart') renderChart(focus); else renderCards(focus);
}
function cardInner(n,isFocus){
  const nm=ocNm(n), act=ocActNm(n); const vac=!nm;
  const third=act?`<div class="oc-cstatus">${ocT('รักษาการ','Acting')}: ${esc(act)}</div>`:`<div class="oc-cdept">${esc(isFocus?(n.division+' / '+n.department):n.department)}</div>`;
  return `${avatar(n)}<div class="oc-cinfo"><div class="oc-cn ${vac?'vac':''}">${esc(nm||ocT('ตำแหน่งว่าง','Vacant'))}</div><div class="oc-ct">${esc(n.title)}${n.grade?' · '+esc(n.grade):''}</div>${third}</div>`;
}
function renderCards(focus){
  const fb=document.getElementById('oc-focusBox'),rh=document.getElementById('oc-rhead'),rg=document.getElementById('oc-grid');
  rg.style.display='';
  if(deptFilter){
    fb.style.display='none'; fb.innerHTML='';
    const list=[...byId.values()].filter(n=>n.department===deptFilter);
    rh.textContent=`${deptFilter} (${list.length})`;
    const groups={}; list.forEach(n=>{ const g=n.grade||ocT('(ไม่ระบุ)','(N/A)'); (groups[g]=groups[g]||[]).push(n); });
    const grades=Object.keys(groups).sort((a,b)=>gRank(a)-gRank(b));
    rg.style.display='block';
    rg.innerHTML=grades.map(g=>{
      const cards=groups[g].sort((a,b)=>(a.title||'').localeCompare(b.title||'')).map(n=>{const k=n.children.length;return `<div class="oc-card kids" onclick="ocSetFocus('${n.position_id}')">${cardInner(n,false)}${k?`<span class="oc-countbadge">▾ ${k}/${descCount(n)}</span>`:''}</div>`;}).join('');
      return `<div class="oc-gradehdr">${ocT('ระดับ','Level')} ${esc(g)} <span class="oc-muted">(${groups[g].length})</span></div><div class="oc-grid" style="margin-bottom:16px">${cards}</div>`;
    }).join('')||`<div class="oc-empty">${ocT('ไม่มีตำแหน่งในแผนกนี้','No positions in this department')}</div>`;
    return;
  }
  let reports;
  if(focus){ fb.style.display='block'; fb.innerHTML=`<div class="oc-focuscard">${cardInner(focus,true)}<span class="oc-badge ${focus.status}">${statusLabel(focus.status)}</span></div>`; reports=focus.children; }
  else { fb.style.display='none'; fb.innerHTML=''; reports=roots; }
  rh.textContent=focus?(reports.length?`${ocT('ผู้ใต้บังคับบัญชาโดยตรง','Direct reports')} (${reports.length})`:ocT('ไม่มีตำแหน่งใต้สังกัด','No subordinates')):`${ocT('ตำแหน่งระดับบนสุด','Top level')} (${reports.length})`;
  rg.innerHTML=reports.map(n=>{const k=n.children.length;return `<div class="oc-card ${k?'kids':''}" ${k?`onclick="ocSetFocus('${n.position_id}')"`:''}>${cardInner(n,false)}${k?`<span class="oc-countbadge">▾ ${k}/${descCount(n)}</span>`:''}</div>`;}).join('')||`<div class="oc-empty">${ocT('ไม่มีผู้ใต้บังคับบัญชา','No subordinates')}</div>`;
}
function chartBox(n){ const nm=ocNm(n); const k=n.children.length; return `<div class="oc-box ${n.status}" onclick="ocSetFocus('${n.position_id}')"><div class="ocb-head">${avatar(n)}<div class="ocb-info"><div class="ocb-name ${nm?'':'vac'}">${esc(nm||ocT('ตำแหน่งว่าง','Vacant'))}</div></div></div><div class="ocb-title2">${esc(n.title)}</div><div class="ocb-foot"><span class="ocb-level">${n.grade?ocT('ระดับ','Level')+' '+esc(n.grade):'—'}</span><span class="oc-badge ${n.status}">${statusLabel(n.status)}</span>${k?`<span class="ocb-cnt">▾ ${k}/${descCount(n)}</span>`:''}</div></div>`; }
function ocZoombarHtml(){
  return `<div class="oc-zoombar"><button class="oc-btn" onclick="ocDepthBy(-1)">− ${ocT('ชั้น','level')}</button><span class="oc-muted" id="oc-depth" style="min-width:54px;text-align:center">${ocT('ชั้น','Levels')} ${chartDepth}</span><button class="oc-btn" onclick="ocDepthBy(1)">+ ${ocT('ชั้น','level')}</button><span style="display:inline-block;width:10px"></span><button class="oc-btn" onclick="ocZoomBy(-0.1)">−</button><span class="oc-muted" id="oc-zoomPct" style="min-width:44px;text-align:center">100%</span><button class="oc-btn" onclick="ocZoomBy(0.1)">+</button><button class="oc-btn" onclick="ocZoomFit()">${ocT('พอดีหน้าจอ','Fit')}</button></div>`;
}
// เลย์เอาต์แนวตั้ง: ลูกน้องเรียงเป็นคอลัมน์ใต้หัวหน้า (indent ตามชั้น) — แคบ ยาวลงมา ไม่กางออกข้าง
function ocRenderVertical(cv, root, MAXD){
  const IND=46, ROW=150, BW=200, BH=132, PAD=8;
  const items=[]; let y=PAD;
  (function place(n,depth){ items.push({n,x:PAD+depth*IND,y,depth}); y+=ROW; if(depth<MAXD) n.children.forEach(c=>place(c,depth+1)); })(root,0);
  const W=Math.max(...items.map(it=>it.x))+BW+PAD, H=y+PAD;
  const posById=new Map(items.map(it=>[it.n.position_id,it]));
  const boxes=items.map(it=>`<div class="oc-tnode" style="left:${it.x}px;top:${it.y}px">${chartBox(it.n)}</div>`).join('');
  let paths='';
  items.forEach(it=>{ if(it.n===root) return; const p=posById.get(it.n.reports_to_position_id); if(!p) return;
    const spineX=p.x+18, startY=p.y+BH, cy=it.y+BH/2, lx=it.x;
    paths+=`<path d="M${spineX} ${startY} V${cy} H${lx}" fill="none" stroke="#b9c2d6" stroke-width="1.5"/>`; });
  cv.innerHTML=`${ocZoombarHtml()}<div class="oc-scroll" id="oc-ocScroll"><div class="oc-zoom" id="oc-ocZoom" style="position:relative;width:${W}px;height:${H}px"><svg class="oc-svg" width="${W}" height="${H}">${paths}</svg>${boxes}</div></div>`;
}
function renderChart(focus){
  const cv=document.getElementById('oc-chartView');
  const root=focus||(roots.length===1?roots[0]:null);
  if(!root){ cv.innerHTML=`<div class="oc-empty">${ocT('ไม่มีข้อมูล','No data')}</div>`; return; }
  const MAXD=chartDepth;
  const BW=200,BH=132,SLOT=218,VGAP=54,PADT=12,PADL=10;
  const GCOLS=6,GMIN=7,GVGAP=14;   // ลูกน้อง leaf ≥ GMIN คน → พับเป็นตาราง GCOLS คอลัมน์
  const nodes=[],depth=new Map(),grid=new Map(),grow=new Map(),xs=new Map(),width=new Map();
  // 1) รวมโหนด + ชั้น + ตั้งธง grid (ลูกทั้งหมดเป็น leaf และจำนวนมาก)
  (function rec(n,d){ nodes.push(n); depth.set(n.position_id,d);
    const kids=d<MAXD?n.children:[];
    grid.set(n.position_id, kids.length>=GMIN && kids.every(k=> d+1>=MAXD || k.children.length===0));
    kids.forEach(c=>rec(c,d+1)); })(root,0);
  // 2) ความกว้าง (สลอต) — grid ใช้ GCOLS สลอต
  (function w(n){ const d=depth.get(n.position_id); const kids=d<MAXD?n.children:[];
    if(!kids.length){ width.set(n.position_id,1); return 1; }
    if(grid.get(n.position_id)){ const c=Math.min(GCOLS,kids.length); kids.forEach(k=>width.set(k.position_id,1)); width.set(n.position_id,c); return c; }
    let s=0; kids.forEach(k=>s+=w(k)); s=Math.max(1,s); width.set(n.position_id,s); return s; })(root);
  // 3) ตำแหน่ง x (สลอต)
  (function ax(n,left){ const d=depth.get(n.position_id); const kids=d<MAXD?n.children:[];
    if(!kids.length){ xs.set(n.position_id,left); return; }
    if(grid.get(n.position_id)){ const c=Math.min(GCOLS,kids.length);
      kids.forEach((k,i)=>{ xs.set(k.position_id,left+(i%c)); grow.set(k.position_id,Math.floor(i/c)); });
      xs.set(n.position_id,left+(c-1)/2); return; }
    let cur=left; kids.forEach(k=>{ ax(k,cur); cur+=width.get(k.position_id); });
    const a=kids.map(k=>xs.get(k.position_id)); xs.set(n.position_id,(Math.min(...a)+Math.max(...a))/2); })(root,0);
  // 4) ความสูงแต่ละแถว (grid ทำให้แถวลูกสูงขึ้น) + Y
  const maxD=Math.max(...nodes.map(n=>depth.get(n.position_id)));
  const rowH=new Array(maxD+1).fill(BH);
  nodes.forEach(n=>{ if(grid.get(n.position_id)){ const cnt=n.children.length, c=Math.min(GCOLS,cnt), rows=Math.ceil(cnt/c); const bh=rows*BH+(rows-1)*GVGAP, cd=depth.get(n.position_id)+1; if(cd<=maxD) rowH[cd]=Math.max(rowH[cd],bh); } });
  const rowY=new Array(maxD+1); rowY[0]=PADT; for(let d=1;d<=maxD;d++) rowY[d]=rowY[d-1]+rowH[d-1]+VGAP;
  const yOf=n=>{ const pid=n.position_id; return grow.has(pid) ? rowY[depth.get(pid)]+grow.get(pid)*(BH+GVGAP) : rowY[depth.get(pid)]; };
  const xpx=n=>PADL+xs.get(n.position_id)*SLOT;
  const maxSlot=Math.max(...[...xs.values()]);
  const W=PADL+(maxSlot+1)*SLOT+PADL, H=rowY[maxD]+rowH[maxD]+PADT;
  const boxes=nodes.map(n=>`<div class="oc-tnode" style="left:${xpx(n)}px;top:${yOf(n)}px">${chartBox(n)}</div>`).join('');
  // 5) เส้นเชื่อม
  let paths='';
  nodes.forEach(n=>{ if(n===root) return; const p=byId.get(n.reports_to_position_id); if(!p||!xs.has(p.position_id)) return;
    if(grid.get(p.position_id)&&grow.has(n.position_id)) return;  // grid วาดแยกด้านล่าง
    const cx=xpx(n)+BW/2,ct=yOf(n),px=xpx(p)+BW/2,pb=yOf(p)+BH,bus=pb+VGAP/2;
    paths+=`<path d="M${px} ${pb} V${bus} H${cx} V${ct}" fill="none" stroke="#b9c2d6" stroke-width="1.5"/>`; });
  nodes.forEach(P=>{ if(!grid.get(P.position_id)) return; const cnt=P.children.length, c=Math.min(GCOLS,cnt), d=depth.get(P.position_id), cd=d+1; if(cd>maxD) return;
    const left=xs.get(P.position_id)-(c-1)/2, blockTop=rowY[cd], busY=blockTop-18, Px=xpx(P)+BW/2, Pb=yOf(P)+BH;
    const colX=cc=>PADL+(left+cc)*SLOT+BW/2, cols0=Math.min(c,cnt);
    paths+=`<path d="M${Px} ${Pb} V${busY}" fill="none" stroke="#b9c2d6" stroke-width="1.5"/>`;
    paths+=`<path d="M${colX(0)} ${busY} H${colX(cols0-1)}" fill="none" stroke="#b9c2d6" stroke-width="1.5"/>`;
    for(let cc=0;cc<cols0;cc++){ const lastRow=Math.floor((cnt-1-cc)/c), bottom=blockTop+lastRow*(BH+GVGAP)+BH; paths+=`<path d="M${colX(cc)} ${busY} V${bottom}" fill="none" stroke="#e0e5ee" stroke-width="1.2"/>`; }
  });
  cv.innerHTML=`${ocZoombarHtml()}<div class="oc-scroll" id="oc-ocScroll"><div class="oc-zoom" id="oc-ocZoom" style="position:relative;width:${W}px;height:${H}px"><svg class="oc-svg" width="${W}" height="${H}">${paths}</svg>${boxes}</div></div>`;
  requestAnimationFrame(ocZoomFit);
}
function ocDepthBy(d){ chartDepth=Math.min(6,Math.max(1,chartDepth+d)); renderDrill(); }
function applyZoom(){ const z=document.getElementById('oc-ocZoom'); if(z)z.style.zoom=chartZoom; const p=document.getElementById('oc-zoomPct'); if(p)p.textContent=Math.round(chartZoom*100)+'%'; }
function ocZoomBy(d){ chartZoom=Math.min(1.5,Math.max(0.3,+(chartZoom+d).toFixed(2))); applyZoom(); }
function ocZoomFit(){ const sc=document.getElementById('oc-ocScroll'),z=document.getElementById('oc-ocZoom'); if(!sc||!z)return; z.style.zoom=1; const nat=z.scrollWidth,av=sc.clientWidth-24; chartZoom=(nat>av)?Math.max(0.3,Math.floor(av/nat*100)/100):1; applyZoom(); }

function renderSearch(){
  const q=document.getElementById('oc-search').value.trim().toLowerCase();
  const sr=document.getElementById('oc-searchResults'),dv=document.getElementById('oc-drillView');
  if(q.length<1){ sr.style.display='none'; dv.style.display='block'; return; }
  const m=allRows.filter(r=>(r.title||'').toLowerCase().includes(q)||(r.incumbent||'').toLowerCase().includes(q)||(r.incumbent_th||'').toLowerCase().includes(q)).slice(0,50);
  dv.style.display='none'; sr.style.display='block';
  sr.innerHTML=m.length?m.map(r=>{ const nm=ocNm(r); return `<div class="it" onclick="ocSetFocus('${r.position_id}')"><div class="t">${esc(r.title)} ${nm?'— '+esc(nm):`<span class="oc-badge vacant">${ocT('ว่าง','Vacant')}</span>`}</div><div class="s">${esc(r.division)} / ${esc(r.department)}${r.grade?' · '+esc(r.grade):''}</div></div>`; }).join(''):`<div class="oc-empty">${ocT('ไม่พบตำแหน่งที่ตรงกับคำค้นหา','No matching positions')}</div>`;
}
document.getElementById('oc-search').addEventListener('input', renderSearch);

function ocSetLang(l){
  lang=l;
  try{ localStorage.setItem('ak_oc_lang', l); }catch(e){}  // จำภาษาที่เลือกล่าสุด
  document.getElementById('lang-en').classList.toggle('active',l==='en');
  document.getElementById('lang-th').classList.toggle('active',l==='th');
  document.querySelectorAll('[data-en][data-th]').forEach(n=>{ n.textContent = l==='en'?n.getAttribute('data-en'):n.getAttribute('data-th'); });
  document.getElementById('oc-search').placeholder = ocT('ค้นหาชื่อตำแหน่ง/ชื่อคน...','Search position / name...');
  if(allRows.length){ populateDept(); renderDrill(); }
}

// พิมพ์/บันทึก PDF — เปิดหน้าต่างใหม่เฉพาะผัง (คุมขนาด/สเกลเอง ไม่ติด CSS/zoom ของจอ)
const OC_PAPER={ a4:[297,210], a3:[420,297], a2:[594,420], a1:[841,594] };  // แนวนอน (มม.)
function ocPrint(){
  const paper=(document.getElementById('oc-paper')||{}).value||'fit';
  if(viewMode!=='chart'){ ocSetMode('chart'); }        // พิมพ์จากโหมดแผนภูมิเส้น
  const z=document.getElementById('oc-ocZoom');
  if(!z){ setTimeout(ocPrint, 300); return; }           // รอ render เสร็จ
  // ขนาดจริงของผัง (จาก inline style ที่ renderChart ตั้งไว้ — ไม่โดน zoom ของจอกวน)
  const natW=Math.ceil(parseFloat(z.style.width)||z.scrollWidth||1);
  const natH=Math.ceil(parseFloat(z.style.height)||z.scrollHeight||1);
  const M=6, titleMM=14; let pageW,pageH,scale;
  if(paper==='fit'){
    const cap=6000; scale=Math.min(1, cap/Math.max(natW,natH));
    const toMM=px=>Math.ceil(px*scale/96*25.4);
    pageW=toMM(natW)+2*M; pageH=toMM(natH)+titleMM+2*M;
  } else {
    [pageW,pageH]=OC_PAPER[paper];
    const availW=(pageW-2*M)/25.4*96, availH=(pageH-2*M-titleMM)/25.4*96;
    scale=Math.min(availW/natW, availH/natH);
  }
  const sw=Math.ceil(natW*scale), sh=Math.ceil(natH*scale);
  const focus=focusId?byId.get(focusId):null;
  const scope=deptFilter||(focus?focus.title:ocT('ทั้งองค์กร','Whole organization'));
  const title=(ocT('ผังองค์กร','Organization Chart')+' — '+scope+'  ('+new Date().toLocaleDateString(lang==='en'?'en-GB':'th-TH')+')').replace(/&/g,'&amp;').replace(/</g,'&lt;');
  const baseCss=(document.querySelector('style')||{}).textContent||'';
  const html='<!DOCTYPE html><html><head><meta charset="utf-8">'
    +'<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">'
    +'<style>'+baseCss+'</style>'
    +'<style>'
    +'@page{ size:'+pageW+'mm '+pageH+'mm; margin:'+M+'mm; }'
    +'html,body{ margin:0; padding:0; background:#fff; font-family:\'IBM Plex Sans Thai\',\'IBM Plex Sans\',sans-serif; }'
    +'#page-orgchart .oc-scroll{ max-height:none!important; overflow:visible!important; padding:0!important; }'
    +'#page-orgchart .oc-zoom{ display:block!important; }'
    +'.pt-title{ font-size:15px; font-weight:700; color:#1B4BA8; margin:0 0 8px; }'
    +'.pt-clip{ width:'+sw+'px; height:'+sh+'px; overflow:hidden; }'
    +'.pt-scale{ transform-origin:top left; transform:scale('+scale.toFixed(4)+'); }'
    +'</style></head><body>'
    +'<div class="pt-title">'+title+'</div>'
    +'<div class="pt-clip"><div class="pt-scale"><div id="page-orgchart"><div class="oc-scroll">'
    +'<div class="oc-zoom" style="position:relative;width:'+natW+'px;height:'+natH+'px">'+z.innerHTML+'</div>'
    +'</div></div></div></div></body></html>';
  const w=window.open('','_blank');
  if(!w){ alert(ocT('เบราว์เซอร์บล็อกป๊อปอัป กรุณาอนุญาต popup แล้วลองใหม่','Popup blocked — please allow popups and retry')); return; }
  w.document.open(); w.document.write(html); w.document.close();
  let done=false;
  const go=()=>{ if(done)return; done=true; try{ w.focus(); w.print(); }catch(e){} setTimeout(()=>{ try{ w.close(); }catch(e){} }, 500); };
  w.onload=()=>setTimeout(go, 400);
  setTimeout(()=>{ if(!done && w && !w.closed) go(); }, 1200);  // เผื่อ onload ไม่ยิง
}

ocSetLang(lang);  // ใช้ภาษาที่จำไว้ (ครั้งแรก = EN) + ตั้งป้ายข้อความ
load();
</script>
